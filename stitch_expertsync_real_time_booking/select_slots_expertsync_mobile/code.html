<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ExpertSync - Slot Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#df7412",
                    "tertiary-fixed": "#ffdcc6",
                    "on-tertiary-fixed-variant": "#723600",
                    "on-primary-fixed": "#001a42",
                    "surface-tint": "#adc6ff",
                    "surface": "#10131a",
                    "on-error": "#690005",
                    "background": "#10131a",
                    "on-tertiary": "#502400",
                    "inverse-surface": "#e1e2ec",
                    "secondary": "#c0c6db",
                    "outline-variant": "#424754",
                    "inverse-on-surface": "#2e3038",
                    "primary-container": "#4d8eff",
                    "tertiary": "#ffb786",
                    "inverse-primary": "#005ac2",
                    "surface-dim": "#10131a",
                    "surface-container-low": "#191b23",
                    "secondary-fixed": "#dce2f7",
                    "surface-container": "#1d2027",
                    "on-tertiary-fixed": "#311400",
                    "primary-fixed-dim": "#adc6ff",
                    "on-surface": "#e1e2ec",
                    "on-primary": "#002e6a",
                    "error": "#ffb4ab",
                    "on-secondary-fixed": "#141b2b",
                    "on-secondary-fixed-variant": "#404758",
                    "surface-variant": "#32353c",
                    "secondary-container": "#404758",
                    "on-primary-fixed-variant": "#004395",
                    "outline": "#8c909f",
                    "surface-container-high": "#272a31",
                    "surface-bright": "#363941",
                    "secondary-fixed-dim": "#c0c6db",
                    "on-tertiary-container": "#461f00",
                    "on-background": "#e1e2ec",
                    "on-error-container": "#ffdad6",
                    "on-primary-container": "#00285d",
                    "on-secondary-container": "#aeb5c9",
                    "error-container": "#93000a",
                    "on-surface-variant": "#c2c6d6",
                    "primary-fixed": "#d8e2ff",
                    "primary": "#adc6ff",
                    "on-secondary": "#293040",
                    "tertiary-fixed-dim": "#ffb786",
                    "surface-container-highest": "#32353c",
                    "surface-container-lowest": "#0b0e15"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit-md": "1rem",
                    "margin-mobile": "1rem",
                    "margin-desktop": "2rem",
                    "unit-xs": "0.25rem",
                    "unit-lg": "1.5rem",
                    "unit-xl": "2.5rem",
                    "unit-sm": "0.5rem",
                    "container-max": "1440px",
                    "gutter": "1.5rem"
            },
            "fontFamily": {
                    "display-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "subheading-sm": ["Inter"],
                    "display-lg-mobile": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-xs": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                    "subheading-sm": ["18px", { "lineHeight": "1.4", "fontWeight": "600" }],
                    "display-lg-mobile": ["36px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                    "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                    "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                    "label-xs": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }]
            }
          }
        }
      }
    </script>
<style>
        /* Hide scrollbar for horizontal scrolling elements */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-surface flex flex-col h-screen antialiased overflow-hidden">
<!-- Transactional Top App Bar -->
<!-- Suppressed global navigation per Destination Rule for Task-Focused screens -->
<header class="flex items-center justify-between px-margin-mobile h-16 border-b border-outline-variant bg-surface-container-lowest z-10 shrink-0">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex items-center gap-unit-sm flex-1 ml-unit-xs">
<img class="w-8 h-8 rounded-full object-cover border border-outline-variant" data-alt="A professional headshot of a female doctor or expert with a warm, confident expression. She is wearing a modern, dark tailored blazer against a minimalist studio background with cool, dramatic lighting that highlights the futuristic, precision-focused aesthetic of the UI. The color palette incorporates deep grays and subtle blue undertones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPAumlaukdUQV2gcbdRMG9Fn_s_ctDG5QVliMfxv8hny85to-x2n9qel28lXnXBNxRtmjsIIjRE0-L7sVddMritBQu0rgBN5lPNIcK4pnkb5o1QX58uZZlqpHWK_CjABRwkjFISNt810OP20O__WYGTl6-1TwoKwftYDEvTtFuGcH0TZSxq0KXGFPlhm5SMOEBqqNl7ucQrWqFMTHnjewhEyAYJZRycVlwA_diREferpQfqx-cnxhU3FWRKH-A2qRyxx0SyHye6KEK"/>
<h1 class="font-subheading-sm text-subheading-sm font-semibold truncate">Dr. Sarah Johnson</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">info</span>
</button>
</header>
<!-- Scrollable Content Area -->
<main class="flex-1 overflow-y-auto pb-24">
<!-- Date Selector Section -->
<section class="mt-unit-lg px-margin-mobile">
<div class="flex items-center justify-between mb-unit-md">
<h2 class="font-label-xs text-label-xs text-on-surface-variant uppercase tracking-wider">Select Date</h2>
<span class="font-label-xs text-label-xs text-primary font-semibold">May 2024</span>
</div>
<div class="flex gap-unit-sm overflow-x-auto snap-x no-scrollbar pb-2">
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[72px] py-unit-md rounded-xl bg-surface border border-outline-variant snap-start transition-colors hover:border-outline">
<span class="font-label-xs text-label-xs text-on-surface-variant mb-1 uppercase">Wed</span>
<span class="font-subheading-sm text-subheading-sm text-on-surface">08</span>
</button>
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[72px] py-unit-md rounded-xl bg-surface border border-outline-variant snap-start transition-colors hover:border-outline">
<span class="font-label-xs text-label-xs text-on-surface-variant mb-1 uppercase">Thu</span>
<span class="font-subheading-sm text-subheading-sm text-on-surface">09</span>
</button>
<!-- Active/Selected Date -->
<button class="flex flex-col items-center justify-center min-w-[72px] py-unit-md rounded-xl bg-primary border-primary snap-start relative overflow-hidden ring-1 ring-primary shadow-[0_0_12px_rgba(173,198,255,0.15)]">
<span class="font-label-xs text-label-xs text-on-primary mb-1 uppercase">Fri</span>
<span class="font-subheading-sm text-subheading-sm text-on-primary">10</span>
<div class="absolute inset-0 bg-white/10"></div>
</button>
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[72px] py-unit-md rounded-xl bg-surface border border-outline-variant snap-start transition-colors hover:border-outline">
<span class="font-label-xs text-label-xs text-on-surface-variant mb-1 uppercase">Sat</span>
<span class="font-subheading-sm text-subheading-sm text-on-surface">11</span>
</button>
<!-- Inactive Date -->
<button class="flex flex-col items-center justify-center min-w-[72px] py-unit-md rounded-xl bg-surface border border-outline-variant snap-start transition-colors hover:border-outline">
<span class="font-label-xs text-label-xs text-on-surface-variant mb-1 uppercase">Sun</span>
<span class="font-subheading-sm text-subheading-sm text-on-surface">12</span>
</button>
</div>
</section>
<!-- Slot Grid Section -->
<section class="mt-unit-xl px-margin-mobile">
<h2 class="font-label-xs text-label-xs text-on-surface-variant uppercase tracking-wider mb-unit-md">Available Times (EST)</h2>
<div class="grid grid-cols-3 gap-unit-md">
<!-- Available Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface text-center font-body-sm text-body-sm text-on-surface hover:border-outline transition-colors">
                    09:00 AM
                </button>
<!-- Booked Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface-variant text-center font-body-sm text-body-sm text-on-surface-variant opacity-40 flex items-center justify-center gap-1 cursor-not-allowed" disabled="">
                    09:30 AM <span class="material-symbols-outlined text-[14px]">close</span>
</button>
<!-- Available Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface text-center font-body-sm text-body-sm text-on-surface hover:border-outline transition-colors">
                    10:00 AM
                </button>
<!-- Available Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface text-center font-body-sm text-body-sm text-on-surface hover:border-outline transition-colors">
                    10:30 AM
                </button>
<!-- Selected Slot -->
<button class="py-unit-md rounded-lg border border-primary bg-primary text-center font-body-sm text-body-sm text-on-primary ring-1 ring-primary shadow-[0_0_8px_rgba(173,198,255,0.3)] relative overflow-hidden">
                    11:00 AM
                    <div class="absolute inset-0 bg-white/10 pointer-events-none"></div>
</button>
<!-- Booked Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface-variant text-center font-body-sm text-body-sm text-on-surface-variant opacity-40 flex items-center justify-center gap-1 cursor-not-allowed" disabled="">
                    11:30 AM <span class="material-symbols-outlined text-[14px]">close</span>
</button>
<!-- Available Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface text-center font-body-sm text-body-sm text-on-surface hover:border-outline transition-colors">
                    01:00 PM
                </button>
<!-- Available Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface text-center font-body-sm text-body-sm text-on-surface hover:border-outline transition-colors">
                    01:30 PM
                </button>
<!-- Available Slot -->
<button class="py-unit-md rounded-lg border border-outline-variant bg-surface text-center font-body-sm text-body-sm text-on-surface hover:border-outline transition-colors">
                    02:00 PM
                </button>
</div>
<!-- Timezone Info -->
<div class="mt-unit-lg flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">public</span>
<span class="font-label-xs text-label-xs">Eastern Standard Time (GMT-5)</span>
</div>
</section>
</main>
<!-- Sticky CTA Bottom Bar -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-surface-container-lowest/95 backdrop-blur-md border-t border-outline-variant z-50">
<button class="w-full bg-primary text-on-primary py-unit-md rounded-xl font-subheading-sm text-subheading-sm flex items-center justify-center gap-2 hover:bg-primary-fixed transition-colors shadow-[0_4px_14px_rgba(173,198,255,0.15)] relative overflow-hidden group">
<span class="relative z-10">Continue Booking</span>
<span class="material-symbols-outlined relative z-10 text-[18px]">arrow_forward</span>
<div class="absolute inset-0 bg-white/0 group-hover:bg-white/10 transition-colors z-0"></div>
</button>
</div>
</body></html>
